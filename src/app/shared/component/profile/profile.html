<div class="modal-header">
  <h4 class="modal-title">{{ title }}</h4>
  <button type="button" class="btn-close" (click)="close()"></button>
</div>
<div class="modal-body">
  <form #doctorForm="ngForm">
    <!-- First Name -->
    <div class="mb-3">
      <label class="form-label">First Name</label>
      <input type="text" class="form-control" name="firstName" [readOnly]="true" [(ngModel)]="user.firstName"
        required />
    </div>

    <!-- Last Name -->
    <div class="mb-3">
      <label class="form-label">Last Name</label>
      <input type="text" class="form-control" name="lastName" [readOnly]="true" [(ngModel)]="user.lastName"
        required />
    </div>

    <!-- Email -->
    <div class="mb-3">
      <label class="form-label">Work Email</label>
      <input type="email" class="form-control" name="workEmail" [readOnly]="true" [(ngModel)]="user.workEmail"
        required />
    </div>

    <div class="mb-3">
      <label class="form-label">Phone </label>
      <input type="text" class="form-control" name="phone" [readOnly]="true" [(ngModel)]="user.phone" required />
    </div>
  </form>
</div>

<div class="modal-footer">
  <div class="d-flex align-items-center justify-content-between">
    <button class="btn btn-primary" (click)="save()" [disabled]="!doctorForm.valid"> Okay </button>
  </div>
</div>
