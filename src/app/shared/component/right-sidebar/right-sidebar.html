<div class="right-sidebar-panel" [class.open]="sidebarService.isOpen()">
  @if(sidebarService.title()){
  <div class="rs-header">
    <h3 class="rs-title">{{ sidebarService.title() }}</h3>
    <!-- <button class="modal-close" (click)="sidebarService.close()">
      <i class="bi bi-x-lg"></i>
    </button> -->
  </div>
  }
  <div class="rs-content">
    <!-- <p>{{ sidebarService.content() }}</p> -->
    <!-- <div style="padding:20px;">
      <h4>Doctor Details</h4>
      <p><strong>Name:</strong> {{sidebarService.details()?.firstName}} {{sidebarService.details()?.lastName}}</p>
      <p><strong>Specialization:</strong> {{sidebarService.details()?.specializations[0]?.name}}</p>
      <p><strong>Contact:</strong> {{sidebarService.details()?.contactNumber}}</p>
      <p><strong>Email:</strong> {{sidebarService.details()?.email}}</p>
    </div> -->
    @if(sidebarService.content() == 'patient'){
    <app-patient-medical-history-details [patientDetails]="sidebarService.details()">
    </app-patient-medical-history-details>
    }
    @else if(sidebarService.content() == 'doctor'){
    <app-edit-doctor-details [doctorDetails]="sidebarService.details()" (saveSuccess)="onsaveSuccess($event)">
    </app-edit-doctor-details>
    }
    @else if(sidebarService.content() == 'edit-appointment'){
    <app-edit-appointment-booking [appointmentDetails]="sidebarService.details()" (saveSuccess)="onsaveSuccess($event)">
    </app-edit-appointment-booking>
    }
    @else if(sidebarService.content() == 'medicine-detail'){
    <app-medicine-details [medicineDetails]="sidebarService.details()"></app-medicine-details>
    }
  </div>
  <div class="rs-footer">
    <button class="btn btn-sm btn-outline-default" (click)="sidebarService.close()">Dismiss</button>
  </div>
</div>
