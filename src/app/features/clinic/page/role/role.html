<div class="flex-container">
  <div class="form-card box">
    <div class="form-card-icon"><i class="bi bi-braces-asterisk"></i></div>
    <div class="form-card-title">Role</div>
    <div class="form-card-sub">Enter Role details.</div>

    <form [formGroup]="roleForm" (ngSubmit)="onSubmit()">

      <!-- Name -->
      <div class="form-group">
        <label class="form-label">Name <span class="req">*</span></label>
        <div class="input-wrap">
          <i class="bi bi-asterisk input-icon"></i>
          <input type="text" class="form-input" placeholder="Enter name" formControlName="name">
        </div>
        <small class="text-danger" *ngIf="roleForm.controls['name'].touched && roleForm.controls['name'].invalid">
          Name is required
        </small>
      </div>

      <!-- Code -->
      <div class="form-group">
        <label class="form-label">Code <span class="req">*</span></label>
        <div class="input-wrap">
          <i class="bi bi-asterisk input-icon"></i>
          <input type="text" class="form-input" placeholder="Enter code" formControlName="code">
        </div>
        <small class="text-danger" *ngIf="roleForm.controls['code'].touched && roleForm.controls['code'].invalid">
          Code is required
        </small>
      </div>

      <!-- Description -->
      <div class="form-group">
        <label class="form-label">Description</label>
        <div class="input-wrap">
          <i class="bi bi-asterisk input-icon"></i>
          <input type="text" class="form-input" placeholder="Enter description" formControlName="description">
        </div>
      </div>

      <!-- Actions -->
      <div class="form-group">
        <button class="btn btn-primary" type="submit" [disabled]="roleForm.invalid">
          <i class="bi bi-floppy2-fill"></i>
          @if (isEdit) {
          <span>Update</span>
          }@else {
          <span>Save</span>
          }
        </button>

        <div class="form-link-row mt-8">
          Back to Clinic / Hospital Registration
          <a class="form-link" (click)="gobackToClickRegistration()">
            <i class="bi bi-arrow-left"></i> Back
          </a>
        </div>
      </div>

    </form>
  </div>
  <div class="services-card box">
    <div class="card-header" style="margin-bottom:4px;">
      <div class="card-title">Registered Roles ({{rolesList.length}})</div>
    </div>
    <div class="vh-scroll-container">
      @for (role of rolesList; track role._id) {
      <div class="service-item">
        <div
          style="width:36px;height:36px;border-radius:10px;background:#CCFBF1;display:flex;align-items:center;justify-content:center;color:#0D9488;font-size:16px;flex-shrink:0;">
          <i class="bi bi-heart-pulse-fill"></i>
        </div>
        <div>
          <div class="service-name">{{role.name}}</div>
          <div class="service-sub">{{role.description}}</div>
        </div>
        <div style="margin-left:auto;text-align:right;">
          <!-- <div style="font-size:13.5px;font-weight:700;color:var(--text-head);">{{ctypes.code}}</div> -->
          <div class="view-all" (click)="deleteRecord(role)"><i class="bi bi-trash"></i>Delete</div>
          <div class="view-all" (click)="patchDataToForm(role)"><i class="bi bi-pencil"></i>Edit</div>
        </div>
      </div>
      }
    </div>
  </div>
</div>
